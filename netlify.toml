[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# API редиректы → Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/uploads/*"
  to     = "/.netlify/functions/uploads/:splat"
  status = 200

# SPA fallback — все маршруты → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
