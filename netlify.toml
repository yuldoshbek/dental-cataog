[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# Все /api/* запросы → единая Netlify Function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

# SPA fallback — все маршруты → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
