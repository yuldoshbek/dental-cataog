# ──────────────────────────────────────────────────────────────────────────
# nginx.docker.conf — конфиг для Docker-среды
# Отличие от nginx.conf: proxy_pass использует имя сервиса "api" (Docker DNS)
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Редирект на HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$host$request_uri;

    # ── Frontend (React SPA) ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Кэш хэшированных файлов Vite (1 год)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 11M;
    }

    # ── Uploads ──────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://api:3001;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

