# ──────────────────────────────────────────────────────────────────────────
# nginx.snippet.conf — Dental Catalog основной контент
#
# Использование:
#   Скопировать в /etc/nginx/snippets/dental-catalog-content.conf
#   Подключается из nginx.conf через: include ...
# ──────────────────────────────────────────────────────────────────────────

root /var/www/dental-catalog/dist;
index index.html;

# ── Gzip ──────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;
gzip_min_length 1024;

# Pre-compressed .gz файлы (если добавить vite-plugin-compression):
# gzip_static on;

# ── Security Headers ───────────────────────────────────────────────────────
add_header X-Frame-Options           "DENY"                            always;
add_header X-Content-Type-Options    "nosniff"                         always;
add_header X-XSS-Protection          "1; mode=block"                   always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

# Content-Security-Policy — настроить под ваш домен при необходимости
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

# ── Статика: хешированные файлы Vite (assets/) ────────────────────────────
# Кеш 1 год — Vite меняет хеш при изменении кода
location ~* ^/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
    access_log off;
}

# Статика без хеша (favicon, manifest и т.д.)
location ~* \.(ico|png|svg|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
    access_log off;
}

# ── Backend API ────────────────────────────────────────────────────────────
location /api/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade         $http_upgrade;
    proxy_set_header   Connection      "upgrade";
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Лимит загрузки файлов (совпадает с MAX_FILE_SIZE_MB + запас)
    client_max_body_size 11M;
}

# ── Uploads (изображения товаров) ─────────────────────────────────────────
location /uploads/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host             $host;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
}

# ── Health check (для мониторинга) ────────────────────────────────────────
location /health {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    access_log off;
}

# ── SPA Fallback ───────────────────────────────────────────────────────────
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
}
