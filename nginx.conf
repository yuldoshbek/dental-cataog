# ──────────────────────────────────────────────────────────────────────────
# nginx.conf — Dental Catalog (Production, VPS)
#
# Структура:
#   Frontend (React SPA)  → /         (dist/ — статика с кешем 1 год)
#   Backend API           → /api/     (proxy → Node.js :3001)
#   Uploads               → /uploads/ (proxy → Node.js :3001)
#   Health check          → /health   (proxy → Node.js :3001)
#
# Установка:
#   cp nginx.conf /etc/nginx/sites-available/dental-catalog
#   ln -s /etc/nginx/sites-available/dental-catalog /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# SSL (после запуска):
#   certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ──────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS редирект ─────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # После получения SSL — включить редирект:
    # return 301 https://$host$request_uri;

    # До SSL — временно раздавать напрямую (убрать после certbot)
    include /etc/nginx/snippets/dental-catalog-content.conf;
}

