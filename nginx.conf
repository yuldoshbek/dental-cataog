# ──────────────────────────────────────────────────────────────────────────
# nginx.conf — Конфигурация Nginx для Dental Catalog
#
# Структура:
#   Frontend (React SPA)  → /       (собранная static из dist/)
#   Backend API           → /api/   (проксируется на Node.js :3001)
#   Uploads               → /uploads/ (проксируется на Node.js :3001)
#
# Инструкция по установке:
#   1. Скопировать этот файл в /etc/nginx/sites-available/dental-catalog
#   2. ln -s /etc/nginx/sites-available/dental-catalog /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Редирект на HTTPS (включить после получения SSL-сертификата)
    # return 301 https://$host$request_uri;

    # ── Frontend (React SPA) ─────────────────────────────────────────────
    root /var/www/dental-catalog/dist;
    index index.html;

    # Gzip компрессия
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Кэш статических ресурсов (хэшированные имена файлов Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      'upgrade';
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Лимит загрузки файлов (должен совпадать с MAX_FILE_SIZE_MB)
        client_max_body_size 11M;
    }

    # ── Uploads (изображения) ────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;

        # Кэш изображений
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── SPA Fallback (все остальное → index.html) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

